<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>⭐ Aziel's Star World ⭐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --duo-green: #58CC02;
            --duo-green-dark: #46A302;
            --duo-green-glow: rgba(88, 204, 2, 0.35);
            --duo-blue: #1CB0F6;
            --duo-blue-dark: #1899D6;
            --duo-red: #FF4B4B;
            --duo-red-dark: #EA2B2B;
            --duo-orange: #FF9600;
            --duo-purple: #CE82FF;
            --duo-yellow: #FFC800;
            --duo-gold: #FFD700;
            --duo-bg: #F7F7F7;
            --duo-card-bg: #FFFFFF;
            --duo-gray: #E5E5E5;
            --duo-light: #777777;
            --duo-white: #3C3C3C;
            --duo-sidebar: #FFFFFF;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            background: var(--duo-bg);
            color: var(--duo-white);
            overscroll-behavior: none;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        /* ═══════════════════════════════════  */
        /*            SCREENS                   */
        /* ═══════════════════════════════════  */
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.35s, transform 0.35s;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen.hidden {
            opacity: 0;
            transform: translateX(30px);
            pointer-events: none;
            position: absolute;
        }

        /* ═══════════════════════════════════  */
        /*         TOP BAR (in lessons)         */
        /* ═══════════════════════════════════  */
        .top-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px 8px;
            flex-shrink: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--duo-light);
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px;
            min-width: 48px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .break-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            min-width: 48px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .break-btn:active { opacity: 1; }

        .progress-track {
            flex: 1;
            height: 18px;
            background: var(--duo-gray);
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--duo-green), #7AE82E);
            border-radius: 12px;
            transition: width 0.5s ease;
            width: 0%;
        }

        /* ═══════════════════════════════════  */
        /*       DUOLINGO TOP STAT BAR           */
        /* ═══════════════════════════════════  */
        .duo-stat-bar {
            width: 100%;
            background: var(--duo-sidebar);
            border-bottom: 2px solid #E5E5E5;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex;
            justify-content: center;
            padding: 10px 0;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .stat-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            max-width: 400px;
            width: 100%;
            padding: 0 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 800;
            font-size: 0.95rem;
        }

        .stat-item .stat-icon { font-size: 1.3rem; }
        .stat-item .stat-val-streak { color: var(--duo-orange); }
        .stat-item .stat-val-gems { color: var(--duo-blue); }
        .stat-item .stat-val-hearts { color: var(--duo-red); }
        .stat-item .stat-val-xp { color: #E6A800; }

        /* ═══════════════════════════════════  */
        /*          HOME SCREEN                 */
        /* ═══════════════════════════════════  */
        .home-screen {
            justify-content: flex-start;
            padding-top: 0;
        }

        .home-header {
            text-align: center;
            padding: 20px 20px 10px;
        }

        .home-mascot {
            font-size: clamp(3.5rem, 12vw, 5rem);
            animation: mascotBounce 2s ease-in-out infinite;
            margin-bottom: 2px;
        }

        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        .home-title {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 900;
            color: var(--duo-white);
            margin-bottom: 0;
        }

        .home-sub {
            color: var(--duo-light);
            font-size: clamp(0.8rem, 2.2vw, 0.95rem);
            font-weight: 700;
            margin-bottom: 0;
        }

        /* ═══════════════════════════════════  */
        /*          LESSON PATH                 */
        /* ═══════════════════════════════════  */
        .lesson-path {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 8px 20px 80px;
            width: 100%;
            max-width: 420px;
        }

        /* Unit header banner (like Duolingo sections) */
        .unit-header {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0 4px;
        }

        .unit-header .unit-label {
            font-weight: 900;
            font-size: 1rem;
            color: #FFFFFF;
        }

        .unit-header .unit-desc {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255,255,255,0.85);
        }

        .unit-header .unit-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
        }

        /* Node container for winding path */
        .node-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: transform 0.15s;
        }

        .lesson-node {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 6px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 7px 0 rgba(0,0,0,0.35);
        }

        .lesson-node:active {
            transform: translateY(4px) scale(0.96);
            box-shadow: 0 3px 0 rgba(0,0,0,0.35);
        }

        .lesson-node.food { border-color: var(--duo-green); background: linear-gradient(135deg, #E8F9D4, #D4F4B8); }
        .lesson-node.family { border-color: var(--duo-red); background: linear-gradient(135deg, #FFE0E0, #FFD0D0); }
        .lesson-node.animals { border-color: var(--duo-blue); background: linear-gradient(135deg, #DBF0FD, #C8E8FC); }
        .lesson-node.colors { border-color: var(--duo-purple); background: linear-gradient(135deg, #F3E4FF, #EAD4FF); }
        .lesson-node.words { border-color: var(--duo-orange); background: linear-gradient(135deg, #FFF0D4, #FFE5B8); }

        .lesson-node.done { opacity: 0.85; }

        .lesson-node.active-node {
            animation: activeGlow 2s ease-in-out infinite;
            box-shadow: 0 7px 0 rgba(0,0,0,0.35), 0 0 20px var(--duo-green-glow);
        }

        @keyframes activeGlow {
            0%, 100% { box-shadow: 0 7px 0 rgba(0,0,0,0.35), 0 0 16px var(--duo-green-glow); }
            50% { box-shadow: 0 7px 0 rgba(0,0,0,0.35), 0 0 30px var(--duo-green-glow), 0 0 50px rgba(88,204,2,0.15); }
        }

        .lesson-node.locked {
            opacity: 0.3;
            cursor: default;
            filter: grayscale(1);
            border-color: var(--duo-gray) !important;
            background: var(--duo-card-bg) !important;
        }

        .lesson-node.locked .lock-icon {
            position: absolute;
            font-size: 1.4rem;
            opacity: 0.6;
        }

        .lesson-node .node-crown {
            position: absolute;
            top: -18px;
            font-size: 1.4rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .lesson-label {
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--duo-light);
            text-align: center;
        }

        /* START button below active node */
        .start-btn {
            background: var(--duo-green);
            color: #FFFFFF;
            border: none;
            padding: 8px 28px;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--duo-green-dark);
            transition: transform 0.12s;
            animation: startPulse 2s ease-in-out infinite;
        }

        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--duo-green-dark);
        }

        @keyframes startPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .path-connector {
            width: 4px;
            height: 20px;
            background: var(--duo-gray);
            border-radius: 2px;
        }

        .path-connector.done { background: var(--duo-gold); opacity: 0.5; }

        /* Winding path offsets */
        .node-wrap.offset-left { transform: translateX(-45px); }
        .node-wrap.offset-right { transform: translateX(45px); }
        .node-wrap.offset-left:active { transform: translateX(-45px) scale(0.97); }
        .node-wrap.offset-right:active { transform: translateX(45px) scale(0.97); }

        /* ═══════════════════════════════════  */
        /*         LESSON SCREEN                */
        /* ═══════════════════════════════════  */
        .lesson-screen {
            justify-content: flex-start;
        }

        .lesson-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 10px 20px;
            gap: 16px;
        }

        /* ─── Question Types ─── */
        .q-character {
            font-size: 3rem;
            margin-bottom: -8px;
        }

        .q-prompt {
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            font-weight: 800;
            color: var(--duo-white);
            text-align: center;
        }

        .q-word-display {
            font-size: clamp(4rem, 16vw, 7rem);
            margin: 5px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .q-word-display:active { transform: scale(1.15); }

        .q-word-label {
            font-size: clamp(1.4rem, 4.5vw, 2rem);
            font-weight: 900;
            color: #E6A800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* ─── Choice Grid ─── */
        .choices-grid {
            display: grid;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .choices-grid.cols-2 { grid-template-columns: 1fr 1fr; }
        .choices-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

        .choice-btn {
            background: var(--duo-card-bg);
            border: 3px solid var(--duo-gray);
            border-bottom-width: 6px;
            border-radius: 16px;
            padding: 18px 10px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.12s, border-color 0.2s, background 0.2s;
        }

        .choice-btn:active {
            transform: translateY(3px);
            border-bottom-width: 3px;
        }

        .choice-btn .choice-emoji {
            font-size: clamp(3rem, 12vw, 4.5rem);
        }

        .choice-btn .choice-label {
            font-size: clamp(0.8rem, 2.2vw, 1rem);
            font-weight: 800;
            color: var(--duo-light);
            text-transform: uppercase;
        }

        .choice-btn.selected {
            border-color: var(--duo-blue);
            background: rgba(28, 176, 246, 0.08);
        }

        .choice-btn.correct {
            border-color: var(--duo-green);
            background: rgba(88, 204, 2, 0.12);
        }

        .choice-btn.wrong {
            border-color: var(--duo-red);
            background: rgba(255, 75, 75, 0.12);
            animation: wrongPulse 0.5s ease;
        }

        .choice-btn.dimmed {
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes wrongPulse {
            0% { transform: scale(1); }
            30% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* ─── Bottom Result Bar ─── */
        .bottom-bar {
            width: 100%;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .result-banner {
            width: 100%;
            max-width: 600px;
            padding: 14px 20px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.1rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .result-banner.correct {
            background: rgba(88, 204, 2, 0.12);
            color: #46A302;
            display: flex;
        }

        .result-banner.wrong {
            background: rgba(255, 75, 75, 0.12);
            color: var(--duo-red);
            display: flex;
        }

        .result-banner .result-icon { font-size: 1.5rem; }

        .continue-btn {
            width: 100%;
            max-width: 600px;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.12s, opacity 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .continue-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
        }

        .continue-btn.check-btn { background: var(--duo-green); color: #FFFFFF; box-shadow: 0 5px 0 var(--duo-green-dark); }
        .continue-btn.next-btn { background: var(--duo-green); color: #FFFFFF; box-shadow: 0 5px 0 var(--duo-green-dark); }
        .continue-btn.retry-btn { background: var(--duo-red); color: #FFFFFF; box-shadow: 0 5px 0 var(--duo-red-dark); }

        .continue-btn:disabled {
            background: var(--duo-gray);
            color: var(--duo-light);
            cursor: default;
            box-shadow: 0 5px 0 #CCCCCC;
        }

        /* ═══════════════════════════════════  */
        /*         INTRO CARD (NEW WORDS)       */
        /* ═══════════════════════════════════  */
        .intro-card {
            background: var(--duo-card-bg);
            border: 3px solid var(--duo-gray);
            border-bottom-width: 6px;
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s;
        }

        .intro-card:active { transform: scale(0.97); border-bottom-width: 3px; }

        .intro-card .intro-emoji {
            font-size: clamp(4.5rem, 18vw, 7rem);
            display: block;
            margin-bottom: 10px;
        }

        .intro-card .intro-word {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 900;
            color: #3C3C3C;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .intro-card .intro-hint {
            font-size: 0.95rem;
            color: var(--duo-light);
            font-weight: 700;
            margin-top: 4px;
        }

        .tap-hint {
            color: var(--duo-light);
            font-size: 0.85rem;
            font-weight: 700;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ═══════════════════════════════════  */
        /*        COMPLETE SCREEN               */
        /* ═══════════════════════════════════  */
        .complete-screen {
            justify-content: center;
            gap: 10px;
        }

        .complete-mascot {
            font-size: clamp(5rem, 18vw, 8rem);
            animation: completeBounce 1s ease-in-out infinite;
        }

        @keyframes completeBounce {
            0%, 100% { transform: scale(1) rotate(-3deg); }
            50% { transform: scale(1.1) rotate(3deg); }
        }

        .complete-title {
            font-size: clamp(2rem, 7vw, 3rem);
            font-weight: 900;
            color: #E6A800;
            text-shadow: 0 2px 12px rgba(255, 200, 0, 0.2);
        }

        .complete-sub {
            font-size: clamp(1.1rem, 3.2vw, 1.4rem);
            color: var(--duo-light);
            font-weight: 700;
        }

        .complete-stats {
            display: flex;
            gap: 16px;
            margin: 12px 0;
        }

        .complete-stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--duo-card-bg);
            border: 2px solid var(--duo-gray);
            border-radius: 16px;
            padding: 14px 22px;
            min-width: 100px;
        }

        .complete-stat-box .cstat-icon { font-size: 1.6rem; }
        .complete-stat-box .cstat-val {
            font-size: 1.5rem;
            font-weight: 900;
            color: #E6A800;
        }
        .complete-stat-box .cstat-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--duo-light);
            text-transform: uppercase;
        }

        .complete-stat-box.xp-box { border-color: #E6A800; }
        .complete-stat-box.accuracy-box { border-color: var(--duo-green); }
        .complete-stat-box.accuracy-box .cstat-val { color: var(--duo-green); }

        .complete-btn {
            background: var(--duo-green);
            color: #FFFFFF;
            border: none;
            padding: 16px 50px;
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 0 var(--duo-green-dark);
            margin-top: 10px;
            transition: transform 0.12s;
        }

        .complete-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--duo-green-dark);
        }

        /* ═══════════════════════════════════  */
        /*           CONFETTI                   */
        /* ═══════════════════════════════════  */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            border-radius: 3px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ═══════════════════════════════════  */
        /*        BALLOON CELEBRATION 🎈        */
        /* ═══════════════════════════════════  */
        .balloon-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 998;
        }

        .balloon {
            position: absolute;
            bottom: -80px;
            font-size: 2.8rem;
            animation: balloonFloat ease-out forwards;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }

        @keyframes balloonFloat {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0.8; }
            20% { transform: translateY(-20vh) scale(1) rotate(-8deg); opacity: 1; }
            50% { transform: translateY(-50vh) scale(1.05) rotate(5deg); opacity: 1; }
            80% { transform: translateY(-80vh) scale(1) rotate(-3deg); opacity: 0.8; }
            100% { transform: translateY(-110vh) scale(0.9) rotate(6deg); opacity: 0; }
        }

        /* ═══════════════════════════════════  */
        /*         FLOATING XP POPUP            */
        /* ═══════════════════════════════════  */
        .xp-popup {
            position: fixed;
            font-size: 1.5rem;
            font-weight: 900;
            color: #E6A800;
            pointer-events: none;
            z-index: 500;
            animation: floatUp 1.2s ease-out forwards;
            text-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
        }

        /* ═══════════════════════════════════  */
        /*       BREAK / CALM DOWN 🫁          */
        /* ═══════════════════════════════════  */
        .break-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #E8F4FD, #D6ECFA, #E8F4FD);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .break-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .break-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(28,176,246,0.3), rgba(28,176,246,0.05));
            border: 3px solid rgba(28,176,246,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.8); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .break-text {
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            font-weight: 800;
            color: #1899D6;
            text-align: center;
            padding: 0 20px;
        }

        .break-stars {
            font-size: 2rem;
            letter-spacing: 8px;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .break-ready-btn {
            background: var(--duo-blue);
            color: #FFFFFF;
            border: none;
            padding: 16px 50px;
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 0 var(--duo-blue-dark);
            margin-top: 20px;
            transition: transform 0.12s;
        }

        .break-ready-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--duo-blue-dark);
        }

        /* ═══════════════════════════════════  */
        /*         SPEAKER BUTTON               */
        /* ═══════════════════════════════════  */
        .speaker-btn {
            background: var(--duo-blue);
            border: none;
            border-radius: 16px;
            width: 64px;
            height: 64px;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 var(--duo-blue-dark);
            transition: transform 0.12s;
        }

        .speaker-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--duo-blue-dark);
        }

        .speaker-btn.speaking {
            animation: speakerPulse 0.6s ease-in-out;
        }

        @keyframes speakerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* ═══════════════════════════════════  */
        /*         HEARTS                       */
        /* ═══════════════════════════════════  */
        .hearts {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 1.3rem;
        }

        .hearts .heart-num {
            font-weight: 900;
            font-size: 1rem;
            color: var(--duo-red);
        }
    </style>
</head>
<body>

    <!-- ═══════════════════════════ HOME SCREEN ═══════════════════════════ -->
    <div class="screen home-screen" id="homeScreen">
        <!-- Duolingo-style top stat bar -->
        <div class="duo-stat-bar">
            <div class="stat-bar-inner">
                <div class="stat-item">
                    <span class="stat-icon">🔥</span>
                    <span class="stat-val-streak" id="streakCount">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">💎</span>
                    <span class="stat-val-gems" id="gemsCount">50</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">⭐</span>
                    <span class="stat-val-xp" id="totalXP">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">❤️</span>
                    <span class="stat-val-hearts">5</span>
                </div>
            </div>
        </div>

        <div class="home-header">
            <div class="home-mascot">🦸‍♂️</div>
            <div class="home-title">Aziel's Star World</div>
            <div class="home-sub">Tap a lesson to start learning!</div>
        </div>

        <div class="lesson-path" id="lessonPath">
            <!-- Filled by JS -->
        </div>
    </div>

    <!-- ═══════════════════════════ LESSON SCREEN ═══════════════════════════ -->
    <div class="screen lesson-screen hidden" id="lessonScreen">
        <div class="top-bar">
            <button class="close-btn" onclick="exitLesson()">🏠</button>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="hearts">
                <span>❤️</span>
                <span class="heart-num" id="heartCount">5</span>
            </div>
            <button class="break-btn" onclick="showBreak()" title="Take a break">🫁</button>
        </div>

        <div class="lesson-body" id="lessonBody">
            <!-- Filled dynamically per question -->
        </div>

        <div class="bottom-bar" id="bottomBar">
            <div class="result-banner" id="resultBanner">
                <span class="result-icon"></span>
                <span class="result-text"></span>
            </div>
            <button class="continue-btn check-btn" id="continueBtn" disabled onclick="onContinue()">
                CHECK
            </button>
        </div>
    </div>

    <!-- ═══════════════════════════ COMPLETE SCREEN ═══════════════════════════ -->
    <div class="screen complete-screen hidden" id="completeScreen">
        <div class="complete-mascot">🏆</div>
        <div class="complete-title" id="completeTitle">AMAZING!</div>
        <div class="complete-sub" id="completeSub">Aziel finished the lesson!</div>
        <div class="complete-stats">
            <div class="complete-stat-box xp-box">
                <span class="cstat-icon">⭐</span>
                <span class="cstat-val" id="lessonXP">+30</span>
                <span class="cstat-label">Total XP</span>
            </div>
            <div class="complete-stat-box accuracy-box">
                <span class="cstat-icon">🎯</span>
                <span class="cstat-val" id="lessonAccuracy">100%</span>
                <span class="cstat-label">Amazing</span>
            </div>
        </div>
        <button class="complete-btn" onclick="goHome()">CONTINUE</button>
    </div>

    <!-- Confetti -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- Break / Calm Down Overlay -->
    <div class="break-overlay" id="breakOverlay">
        <div class="break-circle">🌊</div>
        <div class="break-text">Breathe in... and out... 🫁</div>
        <div class="break-stars">⭐ 🌙 ⭐</div>
        <button class="break-ready-btn" onclick="hideBreak()">I'M READY 💪</button>
    </div>


    <script>
        // ═══════════════════════════════════════════════
        //                LESSON DATA
        //  Designed for a 3-year-old: simple, visual,
        //  high-frequency words that help communication
        // ═══════════════════════════════════════════════
        const lessons = [
            {
                id: 'food',
                icon: '🍎',
                label: 'Food',
                color: '#58CC02',
                words: [
                    { emoji: '🍎', word: 'Apple' },
                    { emoji: '🍌', word: 'Banana' },
                    { emoji: '🥛', word: 'Milk' },
                    { emoji: '🍪', word: 'Cookie' },
                    { emoji: '💧', word: 'Water' },
                    { emoji: '🧃', word: 'Juice' }
                ]
            },
            {
                id: 'family',
                icon: '👨‍👩‍👦',
                label: 'Family',
                color: '#FF4B4B',
                words: [
                    { emoji: '👩', word: 'Mama' },
                    { emoji: '👨', word: 'Dada' },
                    { emoji: '👶', word: 'Baby' },
                    { emoji: '❤️', word: 'Love' },
                    { emoji: '🤗', word: 'Hug' },
                    { emoji: '😘', word: 'Kiss' }
                ]
            },
            {
                id: 'animals',
                icon: '🐶',
                label: 'Animals',
                color: '#1CB0F6',
                words: [
                    { emoji: '🐶', word: 'Dog' },
                    { emoji: '🐱', word: 'Cat' },
                    { emoji: '🐟', word: 'Fish' },
                    { emoji: '🐦', word: 'Bird' },
                    { emoji: '🐻', word: 'Bear' },
                    { emoji: '🐰', word: 'Bunny' }
                ]
            },
            {
                id: 'colors',
                icon: '🎨',
                label: 'Colors',
                color: '#CE82FF',
                words: [
                    { emoji: '🔴', word: 'Red' },
                    { emoji: '🔵', word: 'Blue' },
                    { emoji: '🟢', word: 'Green' },
                    { emoji: '🟡', word: 'Yellow' },
                    { emoji: '🟠', word: 'Orange' },
                    { emoji: '🟣', word: 'Purple' }
                ]
            },
            {
                id: 'words',
                icon: '👋',
                label: 'First Words',
                color: '#FF9600',
                words: [
                    { emoji: '👋', word: 'Hi' },
                    { emoji: '🙋', word: 'Bye' },
                    { emoji: '✅', word: 'Yes' },
                    { emoji: '🚫', word: 'No' },
                    { emoji: '🙏', word: 'Please' },
                    { emoji: '➕', word: 'More' }
                ]
            }
        ];

        // ═══════════════════════════════════
        //           GAME STATE
        // ═══════════════════════════════════
        let totalXP = 0;
        let lessonProgress = {};
        let currentLesson = null;
        let questionQueue = [];
        let questionIndex = 0;
        let hearts = 5;
        let selectedChoice = null;
        let answered = false;
        let lessonXPEarned = 0;

        // Load saved progress
        try {
            const saved = localStorage.getItem('aziel_star_world');
            if (saved) {
                const data = JSON.parse(saved);
                totalXP = data.totalXP || 0;
                lessonProgress = data.lessonProgress || {};
            }
        } catch(e) {}

        function saveProgress() {
            try {
                localStorage.setItem('aziel_star_world', JSON.stringify({
                    totalXP, lessonProgress
                }));
            } catch(e) {}
        }

        // ═══════════════════════════════════
        //   VOICE — Web Speech API 🗣️
        // ═══════════════════════════════════
        // Uses the browser's built-in text-to-speech
        // Crystal clear on iPad (Siri voices) & all devices!

        function speakWord(word) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(word);
            utter.rate = 0.85;
            utter.pitch = 1.1;
            utter.lang = 'en-US';
            window.speechSynthesis.speak(utter);

            // Pulse the speaker button if visible
            const btn = document.querySelector('.speaker-btn');
            if (btn) {
                btn.classList.remove('speaking');
                void btn.offsetWidth;
                btn.classList.add('speaking');
            }
        }

        // ═══════════════════════════════════
        //          SOUND EFFECTS
        // ═══════════════════════════════════
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function ensureAudio() {
            if (!audioCtx) audioCtx = new AudioCtx();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function tone(freq, dur, type = 'sine', vol = 0.25) {
            try {
                ensureAudio();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = type;
                o.frequency.value = freq;
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function sfxCorrect() {
            // Duolingo-style celebration ding! 🎶
            const ctx = audioCtx;
            const now = ctx.currentTime;

            // Bright chime with harmonics
            function chime(freq, start, dur, vol) {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'sine';
                o.frequency.value = freq;
                g.gain.setValueAtTime(vol, now + start);
                g.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
                o.connect(g); g.connect(ctx.destination);
                o.start(now + start); o.stop(now + start + dur);
            }

            // Main ascending chime (Duolingo "ding-ding-DING!")
            chime(880, 0, 0.25, 0.18);      // A5
            chime(1109, 0.08, 0.25, 0.15);  // C#6
            chime(1319, 0.16, 0.4, 0.2);    // E6 — the big sparkle!

            // Shimmer harmonics for that magical feel ✨
            chime(1760, 0.16, 0.3, 0.06);   // A6 overtone
            chime(2637, 0.2, 0.25, 0.03);   // E7 sparkle
        }
        function sfxWrong() { tone(250, 0.25, 'triangle', 0.2); }
        function sfxTap() { tone(700, 0.06); }
        function sfxComplete() {
            [523,587,659,698,784,880,988,1047].forEach((n,i) =>
                setTimeout(() => tone(n, 0.18), i * 90));
        }
        function sfxXP() {
            tone(880, 0.08);
            setTimeout(() => tone(1100, 0.12), 70);
        }

        // ═══════════════════════════════════
        //        HOME SCREEN
        // ═══════════════════════════════════
        function renderHome() {
            document.getElementById('totalXP').textContent = totalXP;
            const path = document.getElementById('lessonPath');
            path.innerHTML = '';

            // Winding path offsets (like Duolingo's S-curve)
            const offsets = ['', 'offset-left', '', 'offset-right', ''];

            lessons.forEach((lesson, i) => {
                const unlocked = i === 0 || lessonProgress[lessons[i-1].id] === 'done';
                const done = lessonProgress[lesson.id] === 'done';
                const isActive = unlocked && !done;

                // Unit header banner
                const header = document.createElement('div');
                header.className = 'unit-header';
                header.style.background = lesson.color;
                const unitDescs = ['Learn yummy food words!', 'Words for people you love!', 'Fun animal friends!', 'Beautiful colors!', 'Words you need every day!'];
                header.innerHTML =
                    '<span class="unit-icon">' + lesson.icon + '</span>' +
                    '<div><div class="unit-label">Unit ' + (i+1) + ': ' + lesson.label + '</div>' +
                    '<div class="unit-desc">' + unitDescs[i] + '</div></div>';
                path.appendChild(header);

                // Connector
                if (i > 0) {
                    const line = document.createElement('div');
                    line.className = 'path-connector' + (done || isActive ? '' : '');
                    if (lessonProgress[lessons[i-1].id] === 'done') line.classList.add('done');
                    path.appendChild(line);
                }

                // Node wrapper for offset + label + START btn
                const wrap = document.createElement('div');
                wrap.className = 'node-wrap ' + offsets[i % offsets.length];

                const node = document.createElement('div');
                node.className = 'lesson-node ' + lesson.id;
                if (done) {
                    node.classList.add('done');
                    node.innerHTML = lesson.icon + '<div class="node-crown">👑</div>';
                } else if (isActive) {
                    node.classList.add('active-node');
                    node.innerHTML = lesson.icon;
                } else if (!unlocked) {
                    node.classList.add('locked');
                    node.innerHTML = '<span class="lock-icon">🔒</span>';
                } else {
                    node.innerHTML = lesson.icon;
                }

                if (unlocked) node.onclick = () => startLesson(lesson);
                wrap.appendChild(node);

                const lbl = document.createElement('div');
                lbl.className = 'lesson-label';
                lbl.textContent = lesson.label;
                wrap.appendChild(lbl);

                // START button for active lesson
                if (isActive) {
                    const startBtn = document.createElement('button');
                    startBtn.className = 'start-btn';
                    startBtn.textContent = 'START ▶';
                    startBtn.onclick = (e) => { e.stopPropagation(); startLesson(lesson); };
                    wrap.appendChild(startBtn);
                }

                path.appendChild(wrap);
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goHome() {
            showScreen('homeScreen');
            renderHome();
        }

        // ═══════════════════════════════════
        //        LESSON ENGINE
        // ═══════════════════════════════════
        function startLesson(lesson) {
            sfxTap();
            currentLesson = lesson;
            hearts = 5;
            lessonXPEarned = 0;
            questionIndex = 0;
            questionQueue = [];

            // TEACH then QUIZ in pairs (like Duolingo!)
            for (let i = 0; i < lesson.words.length; i += 2) {
                const pair = lesson.words.slice(i, i + 2);
                // Intro the pair
                questionQueue.push({ type: 'intro', words: pair });
                // Immediately quiz those words
                pair.forEach(w => {
                    questionQueue.push({
                        type: 'pick-emoji',
                        target: w,
                        pool: lesson.words
                    });
                });
            }

            // Final review round — mixed question types
            const shuffled = [...lesson.words].sort(() => Math.random() - 0.5);
            shuffled.forEach(w => {
                questionQueue.push({
                    type: Math.random() > 0.5 ? 'pick-emoji' : 'pick-word',
                    target: w,
                    pool: lesson.words
                });
            });

            showScreen('lessonScreen');
            updateProgress();
            updateHearts();
            showQuestion();
        }

        function updateProgress() {
            const pct = (questionIndex / questionQueue.length) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
        }

        function updateHearts() {
            document.getElementById('heartCount').textContent = hearts;
        }

        function exitLesson() {
            // Confirm before leaving — prevents accidental taps!
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;';
            overlay.innerHTML = '<div style="font-size:3rem;">🏠</div>' +
                '<div style="font-family:Nunito,sans-serif;font-size:1.3rem;font-weight:800;color:#3C3C3C;text-align:center;">Go back home?</div>' +
                '<div style="display:flex;gap:14px;">' +
                '<button onclick="this.parentElement.parentElement.remove()" style="font-family:Nunito,sans-serif;background:#E5E5E5;color:#3C3C3C;border:none;padding:14px 32px;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #CCCCCC;">STAY ✨</button>' +
                '<button onclick="this.parentElement.parentElement.remove();goHome()" style="font-family:Nunito,sans-serif;background:#FF4B4B;color:#FFFFFF;border:none;padding:14px 32px;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #EA2B2B;">LEAVE 🏠</button>' +
                '</div>';
            document.body.appendChild(overlay);
        }

        // ═══════════════════════════════════
        //      SHOW QUESTION
        // ═══════════════════════════════════
        function showQuestion() {
            if (questionIndex >= questionQueue.length) { finishLesson(); return; }
            if (hearts <= 0) { hearts = 5; updateHearts(); }

            const q = questionQueue[questionIndex];
            const body = document.getElementById('lessonBody');
            selectedChoice = null;
            answered = false;

            const resultBanner = document.getElementById('resultBanner');
            resultBanner.className = 'result-banner';
            resultBanner.style.display = 'none';
            const btn = document.getElementById('continueBtn');
            btn.disabled = true;
            btn.textContent = 'CHECK ✅';
            btn.className = 'continue-btn check-btn';

            if (q.type === 'intro') showIntro(q, body);
            else if (q.type === 'pick-emoji') showPickEmoji(q, body);
            else if (q.type === 'pick-word') showPickWord(q, body);

            updateProgress();
        }

        // ─── INTRO: Teach new words ───
        function showIntro(q, body) {
            const btn = document.getElementById('continueBtn');
            btn.disabled = false;
            btn.textContent = 'GOT IT 👍';
            btn.className = 'continue-btn next-btn';

            body.innerHTML =
                '<div class="q-character">📖</div>' +
                '<div class="q-prompt">New words!</div>' +
                q.words.map(w =>
                    '<div class="intro-card" onclick="speakWord(\'' + w.word.replace(/'/g, "\\'") + '\')">' +
                        '<span class="intro-emoji">' + w.emoji + '</span>' +
                        '<span class="intro-word">' + w.word + '</span>' +
                        '<span class="intro-hint">Tap to hear it 🔊</span>' +
                    '</div>'
                ).join('') +
                '<div class="tap-hint">Tap each card, then press GOT IT!</div>';

            // Auto-speak
            setTimeout(() => {
                speakWord(q.words[0].word);
                if (q.words[1]) setTimeout(() => speakWord(q.words[1].word), 1200);
            }, 400);
        }

        // ─── PICK EMOJI: "Where is DOG?" → tap 🐶 ───
        function showPickEmoji(q, body) {
            const { target, pool } = q;
            let choices = [target];
            let others = pool.filter(w => w.word !== target.word)
                .sort(() => Math.random() - 0.5).slice(0, 2);
            choices.push(...others);
            choices.sort(() => Math.random() - 0.5);

            body.innerHTML =
                '<div class="q-prompt">Tap the right picture!</div>' +
                '<button class="speaker-btn" onclick="speakWord(\'' + target.word.replace(/'/g, "\\'") + '\')">🔊</button>' +
                '<div class="q-word-label">' + target.word + '</div>' +
                '<div class="choices-grid cols-3" id="choicesGrid">' +
                choices.map((c, i) =>
                    '<div class="choice-btn" data-idx="' + i + '" data-word="' + encodeURIComponent(c.word) + '" onclick="selectChoice(this)">' +
                        '<span class="choice-emoji">' + c.emoji + '</span>' +
                    '</div>'
                ).join('') +
                '</div>';

            setTimeout(() => speakWord(target.word), 300);
        }

        // ─── PICK WORD: Show 🐶, pick "Dog" ───
        function showPickWord(q, body) {
            const { target, pool } = q;
            let choices = [target];
            let others = pool.filter(w => w.word !== target.word)
                .sort(() => Math.random() - 0.5).slice(0, 2);
            choices.push(...others);
            choices.sort(() => Math.random() - 0.5);

            body.innerHTML =
                '<div class="q-prompt">What is this?</div>' +
                '<div class="q-word-display" onclick="speakWord(\'' + target.word.replace(/'/g, "\\'") + '\')">' + target.emoji + '</div>' +
                '<div class="choices-grid cols-3" id="choicesGrid">' +
                choices.map((c, i) =>
                    '<div class="choice-btn" data-idx="' + i + '" data-word="' + encodeURIComponent(c.word) + '" onclick="selectChoice(this)">' +
                        '<span class="choice-label" style="font-size:clamp(1rem,3.5vw,1.4rem);">' + c.word + '</span>' +
                    '</div>'
                ).join('') +
                '</div>';

            setTimeout(() => speakWord(target.word), 300);
        }

        // ═══════════════════════════════════
        //       SELECT & CHECK
        // ═══════════════════════════════════
        function selectChoice(el) {
            if (answered) return;
            sfxTap();
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            selectedChoice = el;
            const btn = document.getElementById('continueBtn');
            btn.disabled = false;
            btn.textContent = 'CHECK ✅';
            btn.className = 'continue-btn check-btn';
        }

        function onContinue() {
            const q = questionQueue[questionIndex];

            if (q.type === 'intro' && !answered) {
                questionIndex++;
                showQuestion();
                return;
            }

            if (answered) {
                questionIndex++;
                showQuestion();
                return;
            }

            if (!selectedChoice) return;
            answered = true;

            const picked = decodeURIComponent(selectedChoice.dataset.word);
            const correct = picked === q.target.word;
            const resultBanner = document.getElementById('resultBanner');
            const btn = document.getElementById('continueBtn');

            if (correct) {
                sfxCorrect();
                launchBalloons();
                selectedChoice.classList.add('correct');
                document.querySelectorAll('.choice-btn').forEach(b => {
                    if (b !== selectedChoice) b.classList.add('dimmed');
                });
                resultBanner.className = 'result-banner correct';
                resultBanner.style.display = 'flex';
                resultBanner.innerHTML = '<span class="result-icon">✅</span><span class="result-text">' + q.target.word + '! ⭐</span>';
                btn.textContent = 'CONTINUE ➡️';
                btn.className = 'continue-btn next-btn';
                lessonXPEarned += 5;

                setTimeout(() => speakWord(q.target.word), 400);
                showXPPopup(selectedChoice);

            } else {
                sfxWrong();
                selectedChoice.classList.add('wrong');
                hearts--;
                updateHearts();
                document.querySelectorAll('.choice-btn').forEach(b => {
                    if (decodeURIComponent(b.dataset.word) === q.target.word) b.classList.add('correct');
                });
                resultBanner.className = 'result-banner wrong';
                resultBanner.style.display = 'flex';
                resultBanner.innerHTML = '<span class="result-icon">💙</span><span class="result-text">' + q.target.word + '</span>';
                btn.textContent = 'GOT IT 👍';
                btn.className = 'continue-btn retry-btn';
                setTimeout(() => speakWord(q.target.word), 300);
            }
        }

        function showXPPopup(el) {
            const rect = el.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'xp-popup';
            popup.textContent = '+5 ⭐';
            popup.style.left = (rect.left + rect.width/2 - 30) + 'px';
            popup.style.top = (rect.top - 10) + 'px';
            document.body.appendChild(popup);
            sfxXP();
            setTimeout(() => popup.remove(), 1200);
        }

        // ═══════════════════════════════════
        //        FINISH LESSON
        // ═══════════════════════════════════
        function finishLesson(ranOutOfHearts) {
            if (!ranOutOfHearts) {
                lessonProgress[currentLesson.id] = 'done';
                totalXP += lessonXPEarned;
                saveProgress();
            }

            const titles = ranOutOfHearts
                ? ['Good try!', 'Almost!', 'Keep going!']
                : ['AMAZING!', 'SUPER STAR!', 'WONDERFUL!', 'YOU DID IT!'];
            const subs = ranOutOfHearts
                ? ['Try again to finish the lesson!']
                : ['Aziel, you are incredible!', 'Way to go, Aziel!', 'Aziel is a champion!'];

            document.getElementById('completeTitle').textContent = titles[Math.floor(Math.random() * titles.length)];
            document.getElementById('completeSub').textContent = subs[Math.floor(Math.random() * subs.length)];
            document.getElementById('lessonXP').textContent = ranOutOfHearts ? '0' : '+' + lessonXPEarned;

            // Calculate accuracy
            const totalQ = questionQueue.filter(q => q.type !== 'intro').length;
            const wrongCount = 5 - hearts;
            const accuracy = totalQ > 0 ? Math.round(((totalQ - wrongCount) / totalQ) * 100) : 100;
            document.getElementById('lessonAccuracy').textContent = ranOutOfHearts ? '--' : accuracy + '%';

            // Update accuracy label
            const accBox = document.querySelector('.accuracy-box .cstat-label');
            if (accuracy === 100) accBox.textContent = 'Perfect!';
            else if (accuracy >= 80) accBox.textContent = 'Great!';
            else accBox.textContent = 'Good try';

            showScreen('completeScreen');
            if (!ranOutOfHearts) {
                launchConfetti();
                sfxComplete();
            }
        }

        // ═══════════════════════════════════
        //         CONFETTI
        // ═══════════════════════════════════
        function launchBalloons() {
            const container = document.createElement('div');
            container.className = 'balloon-container';
            document.body.appendChild(container);
            const balloons = ['🎈','🎈','🎈','🟡','🎈','⭐','🎈','🎈','✨','🎈'];
            const colors = ['', 'hue-rotate(60deg)', 'hue-rotate(120deg)', 'hue-rotate(180deg)', 'hue-rotate(240deg)', 'hue-rotate(300deg)'];
            for (let i = 0; i < 8; i++) {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.textContent = balloons[Math.floor(Math.random() * balloons.length)];
                b.style.left = (10 + Math.random() * 80) + '%';
                b.style.animationDuration = (1.8 + Math.random() * 1.2) + 's';
                b.style.animationDelay = (Math.random() * 0.4) + 's';
                b.style.fontSize = (2.2 + Math.random() * 1.2) + 'rem';
                b.style.filter = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(b);
            }
            setTimeout(() => container.remove(), 3500);
        }

        function launchConfetti() {
            const c = document.getElementById('confettiContainer');
            const colors = ['#58CC02','#1CB0F6','#FF4B4B','#FFC800','#CE82FF','#FF9600'];
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                p.style.left = Math.random()*100 + '%';
                p.style.background = colors[Math.floor(Math.random()*colors.length)];
                p.style.width = (Math.random()*8+5) + 'px';
                p.style.height = (Math.random()*8+5) + 'px';
                p.style.animationDuration = (Math.random()*2+1.5) + 's';
                p.style.animationDelay = Math.random()*0.6 + 's';
                c.appendChild(p);
            }
            setTimeout(() => c.innerHTML = '', 4500);
        }

        // ═══════════════════════════════════
        //          INIT
        // ═══════════════════════════════════
        // ═══════════════════════════════════
        //      BREAK / CALM DOWN
        // ═══════════════════════════════════
        function showBreak() {
            document.getElementById('breakOverlay').classList.add('active');
        }

        function hideBreak() {
            document.getElementById('breakOverlay').classList.remove('active');
        }

        // ═══════════════════════════════════
        //          INIT
        // ═══════════════════════════════════
        renderHome();
        document.addEventListener('touchstart', () => ensureAudio(), { once: true });
        document.addEventListener('click', () => ensureAudio(), { once: true });

        // Prevent iPad Safari swipe-back gesture from closing the game
        document.addEventListener('touchstart', function(e) {
            if (e.touches[0].clientX < 25 || e.touches[0].clientX > window.innerWidth - 25) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
